name: Release
on: { push: { tags: ["v*"] } }
permissions: { contents: write }
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run fixtures
      - run: npm run fixtures:performance
      - run: npm run check
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run build
      - run: cd dist && zip -r ../promosift-${{ github.ref_name }}-static.zip .
      - run: cd public/samples && zip -r ../../promosift-${{ github.ref_name }}-sample-pack.zip .
      - run: cp test-results/app-keeps-the-full-local-workflow-private-and-exports-a-ZIP/promosift-selection.zip promosift-${{ github.ref_name }}-example-export.zip
      - run: sha256sum promosift-${{ github.ref_name }}-*.zip > checksums-sha256.txt
      - uses: softprops/action-gh-release@v2
        with:
          name: PromoSift ${{ github.ref_name }} — Curate Better Game Screenshots
          body: |
            ## Highlights

            - Local PNG, JPEG, and WebP screenshot import.
            - Steam resolution validation, blur-like and exposure review suggestions.
            - SHA-256 exact-file detection and dHash duplicate clustering.
            - Visual diversity hints and a manual draggable shortlist board.
            - Original-byte local ZIP export with Contact Sheet, CSV, and project JSON.
            - English and Simplified Chinese UI, with GitHub Pages live demo.

            ## Known limitations

            Technical signals are explainable heuristics, not aesthetic judgments. Pixel art,
            dark scenes, minimal compositions, crops, and overlays can produce false positives
            or negatives. Review every final selection manually before publishing.
          files: |
            promosift-${{ github.ref_name }}-static.zip
            promosift-${{ github.ref_name }}-sample-pack.zip
            promosift-${{ github.ref_name }}-example-export.zip
            checksums-sha256.txt
